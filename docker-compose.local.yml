services:
  cloud-post-db:
    container_name: cloud-post-db
    image: postgres:16.13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cloud-post-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cloud-post-api:
    container_name: cloud-post-api
    build:
      context: cloud-post-api/
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cloud-post-db:5432/${POSTGRES_DB}?schema=public"
      PORT: "3001"
      FRONT_END_DOMAIN_NAME: ${FRONT_END_DOMAIN_NAME}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "3001:3001"
    depends_on:
      - cloud-post-db

  cloud-post-front:
    container_name: cloud-post-front
    build:
      context: cloud-post-front/
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "80"
      NEXT_PUBLIC_API_BASE_URL: "http://cloud-post-api:3001"
    ports:
      - "3000:80"
    depends_on:
      - cloud-post-api

volumes:
  cloud-post-db: